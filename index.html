<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>법률 및 비자 정보 안내</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; margin: 0; padding: 20px; background-color: #f4f4f4; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #2c3e50; padding-bottom: 10px; }
        h2 { color: #e67e22; }
        p { color: #333; }
        .contact { background: #eee; padding: 15px; border-left: 5px solid #2c3e50; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>안녕하세요, 법률 및 비자 가이드입니다.</h1>
        <p>이곳은 외국인 비자 업무 및 법률 상담을 위한 안내 페이지입니다. 앞으로 유익한 정보를 이곳에 업데이트할 예정입니다.</p>
        
        <h2>주요 안내 서비스</h2>
        <ul>
            <li>출입국 및 비자(Visa) 상담</li>
            <li>행정심판 및 민원 대행</li>
            <li>생활 법률 자문</li>
        </ul>

        <div class="contact">
            <strong>상담 문의:</strong> 본인의 연락처나 이메일을 여기에 적으세요.
        </div>
    </div>
</body>
</html>
